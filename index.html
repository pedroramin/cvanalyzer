<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>CV Analyzer</title>
</head>
<body style="font-family: Arial; padding: 20px;">

  <h1>CV Analyzer</h1>

  <h2>Seu saldo:</h2>
  <p id="saldo">Carregando...</p>

  <h2>Comprar moedas</h2>

  <button onclick="comprar(5)">Comprar 5 moedas</button>
  <button onclick="comprar(20)">Comprar 20 moedas</button>
  <button onclick="comprar(50)">Comprar 50 moedas</button>

  <script>
    const userId = '4fb5c82f-a4a9-46b1-b9f6-6495d1a72434'; // depois vamos automatizar

    async function carregarSaldo() {
      const res = await fetch(`/api/wallet?userId=${userId}`);
      const data = await res.json();
      document.getElementById('saldo').innerText = data.coins + ' moedas';
    }

    async function comprar(moedas) {
      const res = await fetch('/api/criar-pedido', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, moedas })
      });

      const data = await res.json();

      if (!res.ok) {
        alert(data.error);
        return;
      }

      // redireciona pro checkout
      window.location.href = data.checkoutUrl;
    }

    carregarSaldo();
  </script>

</body>
</html>
